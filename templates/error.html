{% extends 'base.html' %}

{% block title %}Error{% endblock %}

{% block content %}
<div class="error-page-container">
    <div class="error-box">
        <h2 class="error-box-title">Algo salió mal</h2>
        <p class="error-box-message">{{ message }}</p>
        
        <div class="flex justify-center gap-4">
            <a href="javascript:history.back()" class="btn-error-back">
                Volver atrás
            </a>
            <a href="{% url 'search' %}" class="btn-error-search">
                Ir al buscador
            </a>
        </div>
    </div>
</div>
{% endblock %}
