{% extends 'base.html' %}

{% block title %}Registrarse - PokeAlert{% endblock %}

{% block content %}
<div class="max-w-md mx-auto bg-white rounded-xl shadow-lg border border-gray-100 p-8 my-10">
    <h2 class="text-3xl font-extrabold mb-2 text-center text-gray-800">Crear Cuenta</h2>
    <p class="text-sm text-gray-500 text-center mb-6">Únete a PokeAlert y empieza a monitorear precios</p>

    {% if error %}
        <div class="mb-4 p-4 bg-red-50 text-red-700 rounded-lg border-l-4 border-red-600 flex items-center">
            <span class="mr-2">⚠️</span> {{ error }}
        </div>
    {% endif %}

    <!-- Formulario Tradicional -->
    <form method="POST" class="space-y-4">
        {% csrf_token %}
        
        <div>
            <label class="block text-gray-700 text-sm font-semibold mb-2">Usuario</label>
            <input type="text" name="username" required 
                   class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-red-500 focus:border-transparent transition-all">
        </div>

        <div>
            <label class="block text-gray-700 text-sm font-semibold mb-2">Email</label>
            <input type="email" name="email" required 
                   class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-red-500 focus:border-transparent transition-all">
        </div>

        <div>
            <label class="block text-gray-700 text-sm font-semibold mb-2">Contraseña</label>
            <input type="password" name="password" required 
                   class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-red-500 focus:border-transparent transition-all">
        </div>

        <div>
            <label class="block text-gray-700 text-sm font-semibold mb-2">Confirmar Contraseña</label>
            <input type="password" name="password_confirm" required 
                   class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-red-500 focus:border-transparent transition-all">
        </div>

        <button type="submit" class="w-full bg-red-600 text-white font-bold py-2.5 rounded-lg hover:bg-red-700 transition-colors shadow-md shadow-red-100">
            Registrarse
        </button>
    </form>

    <hr class="my-6 border-gray-200">

    <p class="text-center text-sm text-gray-600">
        ¿Ya tienes cuenta? <a href="{% url 'login' %}" class="text-red-600 hover:underline font-bold">Inicia sesión aquí</a>
    </p>
</div>
{% endblock %}
