{% extends 'base.html' %}

{% block title %}Iniciar Sesión - PokeAlert{% endblock %}

{% block content %}
<div class="max-w-md mx-auto bg-white rounded-lg shadow p-8">
    <h2 class="text-2xl font-bold mb-6 text-center">Iniciar Sesión</h2>

    {% if error %}
        <div class="mb-4 p-4 bg-red-100 text-red-700 rounded">
            ⚠️ {{ error }}
        </div>
    {% endif %}

    <form method="POST">
        {% csrf_token %}
        
        <div class="mb-4">
            <label class="block text-gray-700 font-medium mb-2">Usuario</label>
            <input type="text" name="username" required 
                   class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:border-red-600">
        </div>

        <div class="mb-6">
            <label class="block text-gray-700 font-medium mb-2">Contraseña</label>
            <input type="password" name="password" required 
                   class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:border-red-600">
        </div>

        <button type="submit" class="w-full bg-red-600 text-white font-bold py-2 rounded-lg hover:bg-red-700">
            Iniciar Sesión
        </button>
    </form>

    <p class="text-center mt-4 text-gray-600">
        ¿No tienes cuenta? <a href="{% url 'register' %}" class="text-red-600 hover:underline font-bold">Regístrate</a>
    </p>
</div>
{% endblock %}
